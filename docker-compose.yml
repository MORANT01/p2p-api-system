version: '3.8'
services:
  node-1:
    build: .
    container_name: p2p-node-1
    ports:
      - "3000:3000"
    environment:
      NODE_ID: node-1
      NODE_PORT: 3000
      BOOTSTRAP_PEERS: node-2:3001
    depends_on:
      - node-2
    networks:
      - p2p-network

  node-2:
    build: .
    container_name: p2p-node-2
    ports:
      - "3001:3001"
    environment:
      NODE_ID: node-2
      NODE_PORT: 3001
    networks:
      - p2p-network

  node-3:
    build: .
    container_name: p2p-node-3
    ports:
      - "3002:3002"
    environment:
      NODE_ID: node-3
      NODE_PORT: 3002
      BOOTSTRAP_PEERS: node-1:3000
    depends_on:
      - node-1
    networks:
      - p2p-network

networks:
  p2p-network:
    driver: bridge
